<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* PASSWORD PAGE */
#loginPage{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1600')
center/cover no-repeat;
position:relative;
}

#loginPage::before{
content:"";
position:absolute;
inset:0;
backdrop-filter:blur(8px);
background:rgba(0,0,0,0.4);
}

.login-box{
position:relative;
z-index:1;
width:400px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border-radius:20px;
padding:30px;
text-align:center;
color:white;
box-shadow:0 0 25px rgba(255,255,255,0.3);
}

.login-box h2{
font-size:35px;
margin-bottom:15px;
}

.login-box input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin:15px 0;
font-size:16px;
}

.login-box button{
padding:12px 30px;
border:none;
border-radius:10px;
background:#00b894;
color:white;
cursor:pointer;
font-size:16px;
}

.login-box button:hover{
background:#009d7d;
}

#error{
margin-top:10px;
color:#ff7675;
}

/* MAIN WEBSITE */
#mainSite{
display:none;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#4e54c8);
background-size:400% 400%;
animation:bg 10s ease infinite;
min-height:100vh;
color:white;
text-align:center;
padding:20px;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
max-width:1200px;
margin:auto;
}

h1{
font-family:'Great Vibes', bold;
font-size:50px;
margin-top:20px;
text-shadow:0 0 20px cyan;
}

.double-line{
width:250px;
margin:10px auto 20px;
border-top:4px solid white;
border-bottom:4px solid cyan;
height:10px;
}

.welcome{
font-size:30px;
font-weight:600;
margin-bottom:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.gallery img{
width:100%;
height:220px;
object-fit:cover;
border-radius:20px;
box-shadow:0 0 20px rgba(255,255,255,0.5);
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.08);
}

.text-box{
margin-top:40px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:25px;
border-radius:20px;
font-size:18px;
line-height:1.8;
}
</style>
